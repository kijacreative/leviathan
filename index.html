<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #02060c; color: var(--text-primary); font-family: var(--font-body); }
  a { color: inherit; }
  ::selection { background: rgba(79,184,232,0.28); }

  /* ---- Atmosphere ---- */
  @keyframes lev-ray { from { opacity: 0.5; } to { opacity: 1; } }
  @keyframes lev-drift { 0% { transform: translateY(40px); opacity: 0; } 12% { opacity: var(--o,.3); } 88% { opacity: var(--o,.3); } 100% { transform: translateY(-160px); opacity: 0; } }
  @keyframes lev-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  @keyframes lev-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes lev-rise { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes lev-pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }

  /* scroll-reveal — content is ALWAYS visible (opacity:1); only a transform
     slides it in, so a throttled/exported frame never hides content. */
  .reveal { opacity: 1; }
  @media (prefers-reduced-motion: no-preference) {
    .reveal.in { animation: lev-reveal .65s var(--ease-deep) both; }
  }
  @keyframes lev-reveal { from { transform: translateY(24px); } to { transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
